<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Beat</title>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

<div class="form-page">
  <div class="create-form">

    <form id="beatForm">
      <h2>Upload Beat</h2>

      <!-- MP3 PREVIEW -->
      <label>Preview (MP3) *</label>
      <input type="file" id="mp3Input" accept="audio/mp3,audio/*" required>
      <audio id="mp3Preview" controls style="display:none; width:100%; margin-top:10px;"></audio>

      <!-- WAV -->
      <label>Full Beat (WAV)</label>
      <input type="file" id="wavInput" accept=".wav,audio/wav">

      <!-- ZIP -->
      <label>Project File (ZIP)</label>
      <input type="file" id="zipInput" accept=".zip">

      <!-- COVER -->
      <label>Cover Art *</label>
      <input type="file" id="coverInput" accept="image/*" required>
      <img id="coverPreview" src="images/logo.png" style="width:100%; margin-top:10px;">

      <!-- 🟩 BEAT INFO -->
      <label>Beat Name *</label>
      <input type="text" id="title" required>

      <label>Genre</label>
      <input type="text" id="genre">

      <label>Mood</label>
      <input type="text" id="mood">

      <label>Type Beat</label>
      <input type="text" id="type">

      <label>BPM</label>
      <input type="number" id="bpm">

      <label>Key</label>
      <input type="text" id="key">

      <button type="submit" id="uploadBtn">Upload Beat</button>
    </form>

  </div>
</div>

<script>
const API_URL = 'https://api.dopetonevault.com/api/beats'
const form = document.getElementById("beatForm");
const uploadBtn = document.getElementById("uploadBtn");

// =========================
// 🖼 PREVIEW HANDLERS
// =========================
document.getElementById("mp3Input").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    const preview = document.getElementById("mp3Preview");
    preview.src = url;
    preview.style.display = "block";
  }
};

document.getElementById("coverInput").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    document.getElementById("coverPreview").src = url;
  }
};

// =========================
// 🔥 UPLOAD TO CLOUDFLARE R2
// =========================
async function uploadToR2(file, folder) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('folder', folder);
  
  const res = await fetch(`${API_URL}/upload`, {
    method: 'POST',
    body: formData
  });
  
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Upload failed: ${err}`);
  }
  
  const data = await res.json();
  return data.url; // Your API returns { url: 'https://...' }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // =========================
  // 🧠 GET FORM DATA
  // =========================
  const title = document.getElementById("title").value;
  const genre = document.getElementById("genre").value;
  const mood = document.getElementById("mood").value;
  const type = document.getElementById("type").value;
  const bpm = document.getElementById("bpm").value;
  const key = document.getElementById("key").value;

  const mp3File = document.getElementById("mp3Input").files[0];
  const coverFile = document.getElementById("coverInput").files[0];
  const wavFile = document.getElementById("wavInput").files[0];
  const zipFile = document.getElementById("zipInput").files[0];

  if (!mp3File ||!coverFile ||!title) {
    alert("MP3, Cover, and Title are required ❌");
    return;
  }

  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";

  try {
    // =========================
    // 🎵 UPLOAD FILES TO R2
    // =========================
    uploadBtn.textContent = "Uploading MP3...";
    const mp3Url = await uploadToR2(mp3File, 'beats');

    uploadBtn.textContent = "Uploading Cover...";
    const coverUrl = await uploadToR2(coverFile, 'covers');

    let wavUrl = null;
    if (wavFile) {
      uploadBtn.textContent = "Uploading WAV...";
      wavUrl = await uploadToR2(wavFile, 'wavs');
    }

    let zipUrl = null;
    if (zipFile) {
      uploadBtn.textContent = "Uploading ZIP...";
      zipUrl = await uploadToR2(zipFile, 'projects');
    }

    // =========================
    // 💾 SAVE TO D1 DATABASE
    // =========================
    uploadBtn.textContent = "Saving to database...";
    
    const res = await fetch(`${API_URL}/beats`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title,
        genre,
        mood,
        type,
        bpm: bpm? parseInt(bpm) : null,
        key,
        mp3_url: mp3Url,
        cover_url: coverUrl,
        wav_url: wavUrl,
        zip_url: zipUrl
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`Database error: ${err}`);
    }

    alert("🔥 Beat uploaded successfully!");
    form.reset();
    document.getElementById("mp3Preview").style.display = "none";
    document.getElementById("coverPreview").src = "images/logo.png";

  } catch (err) {
    console.error(err);
    alert("Upload failed 💀: " + err.message);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "Upload Beat";
  }
});
</script>

  #cf-fab-container{position:fixed!important;bottom:90px!important;right:20px!important;z-index:99999999!important;display:block!important;visibility:visible!important;opacity:1!important;pointer-events:auto!important;font-family:Inter,system-ui,sans-serif}

<div id="cf-fab-container">
  <div id="cf-fab-queue"></div>
  <button id="cf-fab-btn" title="Upload to R2">⬆️</button>
  <input type="file" id="cf-file-input" multiple hidden>
</div>
<div id="cf-drop"><div style="text-align:center"><div style="font-size:40px;font-weight:900;color:#fff">DROP FILES HERE</div><div style="color:#f97316;margin-top:8px;font-weight:700">HEAVY FILES WILL BE COMBINED IN R2</div></div></div>

<script>
(function(){
  const WORKER_URL = 'https://creation-system-api.dopetone701.workers.dev';
  const CHUNK_SIZE = 5*1024*1024;
  const PARALLEL = 3;
  const queue = document.getElementById('cf-fab-queue');
  const btn = document.getElementById('cf-fab-btn');
  const input = document.getElementById('cf-file-input');
  const drop = document.getElementById('cf-drop');
  btn.addEventListener('click', () => input.click());
  input.addEventListener('change', e => handleFiles(e.target.files));
  window.addEventListener('dragover', e => { e.preventDefault(); drop.classList.add('on'); });
  window.addEventListener('dragleave', e => { if(!e.relatedTarget) drop.classList.remove('on'); });
  window.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('on'); if(e.dataTransfer.files.length) handleFiles(e.dataTransfer.files); });
  function handleFiles(files){
    for(const file of files){
      const id = Math.random().toString(36).slice(2,8);
      const card = document.createElement('div');
      card.className='cf-queue-card'; card.id='card-'+id;
      card.innerHTML = `<div style="display:flex;justify-content:space-between;align-items:start"><div><div class="cf-filename">${file.name}</div><div class="cf-filesize">${(file.size/1024/1024).toFixed(2)} MB</div></div><button class="cf-action-btn" onclick="document.getElementById('card-${id}').remove()">✕</button></div><div class="cf-progress-track"><div class="cf-progress-fill" id="fill-${id}"></div></div><div class="cf-card-foot"><span id="status-${id}">Starting...</span><span id="speed-${id}"></span></div><div id="link-${id}" style="display:none;margin-top:10px"><input id="input-${id}" style="width:100%;background:#000;border:1px solid #333;color:#4ade80;padding:8px;border-radius:6px;font-size:11px" readonly><button class="cf-action-btn" style="width:100%;margin-top:6px;background:#f97316!important;font-weight:700" onclick="navigator.clipboard.writeText(document.getElementById('input-${id}').value);this.textContent='Copied!'">COPY R2 URL</button></div>`;
      queue.appendChild(card);
      uploadFile(file,id);
    }
  }
  async function uploadFile(file,id){
    const fill = document.getElementById('fill-'+id);
    const status = document.getElementById('status-'+id);
    const speed = document.getElementById('speed-'+id);
    const key = `beats/${Date.now()}-${file.name.replace(/[^a-zA-Z0-9.-]/g,'_')}`;
    try{
      if(file.size < 90*1024*1024){
        status.textContent = 'Uploading (single, no chunks)...';
        const res = await fetch(`${WORKER_URL}/upload-single?key=${encodeURIComponent(key)}`, {method:'PUT',headers:{'Content-Type':file.type||'application/octet-stream'},body:file}).then(r=>r.json());
        if(res.error) throw new Error(res.error);
        fill.style.width='100%'; status.textContent='Done ✓ Saved as Standard';
        document.getElementById('link-'+id).style.display='block';
        document.getElementById('input-'+id).value=res.url;
        return;
      }
      const totalChunks = Math.ceil(file.size / CHUNK_SIZE);
      status.textContent=`Creating multipart (${totalChunks} chunks)...`;
      const init = await fetch(`${WORKER_URL}/create-multipart`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,contentType:file.type})}).then(r=>r.json());
      if(init.error) throw new Error(init.error);
      const uploadId=init.uploadId; let uploaded=0; const parts=new Array(totalChunks); const partQueue=Array.from({length:totalChunks},(_,i)=>i+1); let lastT=Date.now(),lastB=0;
      async function uploadWorker(){
        while(partQueue.length){
          const pNum=partQueue.shift(); if(!pNum) break;
          const start=(pNum-1)*CHUNK_SIZE,end=Math.min(start+CHUNK_SIZE,file.size);
          const {url}=await fetch(`${WORKER_URL}/get-part-url`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,uploadId,partNumber:pNum})}).then(r=>r.json());
          const put=await fetch(url,{method:'PUT',body:file.slice(start,end)});
          if(!put.ok) throw new Error(`Chunk ${pNum} failed ${put.status}`);
          const etag=put.headers.get('etag'); if(!etag) throw new Error('No etag '+pNum);
          parts[pNum-1]={partNumber:pNum,etag:etag}; uploaded+=(end-start);
          fill.style.width=(uploaded/file.size*100)+'%'; status.textContent=`${(uploaded/file.size*100).toFixed(1)}% • ${uploaded/1024/1024|0}/${file.size/1024/1024|0} MB`;
          const now=Date.now(); if(now-lastT>500){speed.textContent=((uploaded-lastB)/((now-lastT)/1000)/1024/1024).toFixed(2)+' MB/s'; lastT=now; lastB=uploaded;}
        }
      }
      await Promise.all(Array.from({length:PARALLEL},()=>uploadWorker()));
      if(parts.some(p=>!p)) throw new Error('Missing parts');
      status.textContent='Combining chunks in R2...';
      const done=await fetch(`${WORKER_URL}/complete-multipart`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({key,uploadId,parts})}).then(r=>r.json());
      if(done.error) throw new Error('Combine failed: '+done.error);
      status.textContent='Done ✓ Combined in R2 as Standard'; fill.style.width='100%'; speed.textContent='';
      document.getElementById('link-'+id).style.display='block'; document.getElementById('input-'+id).value=done.url;
    }catch(e){console.error(e); status.textContent='Error: '+e.message; fill.style.background='#ef4444';}
  }
})();
</script>
