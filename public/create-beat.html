<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Beat</title>
  <link rel="stylesheet" href="styles/main.css">
</head>

<body>

<div class="form-page">
  <div class="create-form">

    <form id="beatForm">
      <h2>Upload Beat</h2>

      <!-- MP3 PREVIEW -->
      <label>Preview (MP3) *</label>
      <input type="file" id="mp3Input" accept="audio/mp3,audio/*" required>
      <audio id="mp3Preview" controls style="display:none; width:100%; margin-top:10px;"></audio>

      <!-- WAV -->
      <label>Full Beat (WAV)</label>
      <input type="file" id="wavInput" accept=".wav,audio/wav">

      <!-- ZIP -->
      <label>Project File (ZIP)</label>
      <input type="file" id="zipInput" accept=".zip">

      <!-- COVER -->
      <label>Cover Art *</label>
      <input type="file" id="coverInput" accept="image/*" required>
      <img id="coverPreview" src="images/logo.png" style="width:100%; margin-top:10px;">

      <!-- 🟩 BEAT INFO -->
      <label>Beat Name *</label>
      <input type="text" id="title" required>

      <label>Genre</label>
      <input type="text" id="genre">

      <label>Mood</label>
      <input type="text" id="mood">

      <label>Type Beat</label>
      <input type="text" id="type">

      <label>BPM</label>
      <input type="number" id="bpm">

      <label>Key</label>
      <input type="text" id="key">

      <button type="submit" id="uploadBtn">Upload Beat</button>
    </form>

  </div>
</div>

<script>
const API_URL = 'https://api.dopetonevault.com/api/beats'
const form = document.getElementById("beatForm");
const uploadBtn = document.getElementById("uploadBtn");

// =========================
// 🖼 PREVIEW HANDLERS
// =========================
document.getElementById("mp3Input").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    const preview = document.getElementById("mp3Preview");
    preview.src = url;
    preview.style.display = "block";
  }
};

document.getElementById("coverInput").onchange = (e) => {
  const file = e.target.files[0];
  if (file) {
    const url = URL.createObjectURL(file);
    document.getElementById("coverPreview").src = url;
  }
};

// =========================
// 🔥 UPLOAD TO CLOUDFLARE R2
// =========================
async function uploadToR2(file, folder) {
  const formData = new FormData();
  formData.append('file', file);
  formData.append('folder', folder);
  
  const res = await fetch(`${API_URL}/upload`, {
    method: 'POST',
    body: formData
  });
  
  if (!res.ok) {
    const err = await res.text();
    throw new Error(`Upload failed: ${err}`);
  }
  
  const data = await res.json();
  return data.url; // Your API returns { url: 'https://...' }
}

form.addEventListener("submit", async (e) => {
  e.preventDefault();

  // =========================
  // 🧠 GET FORM DATA
  // =========================
  const title = document.getElementById("title").value;
  const genre = document.getElementById("genre").value;
  const mood = document.getElementById("mood").value;
  const type = document.getElementById("type").value;
  const bpm = document.getElementById("bpm").value;
  const key = document.getElementById("key").value;

  const mp3File = document.getElementById("mp3Input").files[0];
  const coverFile = document.getElementById("coverInput").files[0];
  const wavFile = document.getElementById("wavInput").files[0];
  const zipFile = document.getElementById("zipInput").files[0];

  if (!mp3File ||!coverFile ||!title) {
    alert("MP3, Cover, and Title are required ❌");
    return;
  }

  uploadBtn.disabled = true;
  uploadBtn.textContent = "Uploading...";

  try {
    // =========================
    // 🎵 UPLOAD FILES TO R2
    // =========================
    uploadBtn.textContent = "Uploading MP3...";
    const mp3Url = await uploadToR2(mp3File, 'beats');

    uploadBtn.textContent = "Uploading Cover...";
    const coverUrl = await uploadToR2(coverFile, 'covers');

    let wavUrl = null;
    if (wavFile) {
      uploadBtn.textContent = "Uploading WAV...";
      wavUrl = await uploadToR2(wavFile, 'wavs');
    }

    let zipUrl = null;
    if (zipFile) {
      uploadBtn.textContent = "Uploading ZIP...";
      zipUrl = await uploadToR2(zipFile, 'projects');
    }

    // =========================
    // 💾 SAVE TO D1 DATABASE
    // =========================
    uploadBtn.textContent = "Saving to database...";
    
    const res = await fetch(`${API_URL}/beats`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        title,
        genre,
        mood,
        type,
        bpm: bpm? parseInt(bpm) : null,
        key,
        mp3_url: mp3Url,
        cover_url: coverUrl,
        wav_url: wavUrl,
        zip_url: zipUrl
      })
    });

    if (!res.ok) {
      const err = await res.text();
      throw new Error(`Database error: ${err}`);
    }

    alert("🔥 Beat uploaded successfully!");
    form.reset();
    document.getElementById("mp3Preview").style.display = "none";
    document.getElementById("coverPreview").src = "images/logo.png";

  } catch (err) {
    console.error(err);
    alert("Upload failed 💀: " + err.message);
  } finally {
    uploadBtn.disabled = false;
    uploadBtn.textContent = "Upload Beat";
  }
});
</script>
