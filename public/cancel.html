<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Cancelled</title>

<!-- ✅ IMPORTANT: LOAD STRIPE -->
<script src="https://js.stripe.com/v3/"></script>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;

  /* ✅ FIX BG PATH */
  background: url("/images/vault-image.png") center/cover no-repeat;
}

/* glass effect */
body::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(10, 10, 20, 0.7);
  backdrop-filter: blur(12px);
}

.cancel-card {
  position: relative;
  z-index: 2;
  padding: 40px;
  border-radius: 20px;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  text-align: center;
  color: white;
}

.btn-group {
  margin-top: 20px;
}

.btn {
  padding: 10px 20px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

.home {
  background: gray;
  color: white;
}

.retry {
  background: linear-gradient(45deg, blue, red);
  color: white;
}
</style>
</head>

<body>

<div class="cancel-card">
  <h2>❌ Payment Cancelled</h2>
  <p>You didn’t unlock the vault yet.<br>Your sound is still waiting.</p>

  <div class="btn-group">
    <a href="/" class="btn home">Back to Vault</a>
    <button id="retryBtn" class="btn retry">Try Again</button>
  </div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const beat = params.get("beat");
const price = params.get("price");

console.log("Cancel data:", beat, price);

// ✅ INIT STRIPE
const stripe = Stripe("pk_test_51TMjXCJrs2djvfJIbYMYgQ23yy0vzIwPvbPc9m5qghzGgg9NMECTyNWebBGqkLULxb4rI1dXwBS5uYjLKLQY3idp003dEmbIVy");

document.getElementById("retryBtn").addEventListener("click", async () => {
  if (!beat || !price) {
    alert("Missing data. Go back to vault.");
    return;
  }

  try {
    const res = await fetch("/create-checkout-session", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        name: beat,
        price: Number(price)
      })
    });

    const data = await res.json();

    if (!data.id) {
      alert("Session error");
      return;
    }

    await stripe.redirectToCheckout({
      sessionId: data.id
    });

  } catch (err) {
    console.error("Retry failed:", err);
  }
});
</script>

</body>
</html>
