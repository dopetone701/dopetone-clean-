<!-- pages/auth.html -->
<div id="authSystemRoot" data-version="2.1">

  <!-- AUTH MODAL -->
  <div id="authModal" class="auth-modal" role="dialog" aria-labelledby="authTitle" aria-hidden="true">
    <div class="auth-box" id="authBox">
      <button class="auth-close" id="authCloseBtn" aria-label="Close auth modal">
        <i class="fa-solid fa-xmark"></i>
      </button>
      <div class="auth-header">
        <h2 id="authTitle">Welcome Back</h2>
        <p class="auth-subtitle" id="authSubtitle">Login to access your arsenal</p>
      </div>
      <form id="authForm" class="auth-form" autocomplete="on">
        <div class="auth-input-group" id="usernameGroup" style="display:none;">
          <label for="authUsername">Username</label>
          <input type="text" id="authUsername" name="username" placeholder="Choose a username" autocomplete="username" autocapitalize="off" spellcheck="false" minlength="3" maxlength="20">
        </div>
        <div class="auth-input-group">
          <label for="authEmail">Email</label>
          <input type="email" id="authEmail" name="email" placeholder="you@example.com" autocomplete="email" required spellcheck="false">
        </div>
        <div class="auth-input-group">
          <label for="authPassword">Password</label>
          <input type="password" id="authPassword" name="password" placeholder="••••••••" autocomplete="current-password" required minlength="6">
          <button type="button" id="forgotPasswordBtn" class="forgot-password-link">Forgot password?</button>
        </div>
        <div id="signupAvatarWrap" class="signup-avatar-wrap" style="display:none; text-align:center; margin:20px 0;">
  <div style="position:relative; display:inline-block; width:90px; height:90px;">
    <div id="avatarPreview" style="width:90px; height:90px; border-radius:50%; background:#0a0a0a; border:2px solid #0f0; display:flex; align-items:center; justify-content:center; overflow:hidden;">
      <i class="fa-solid fa-user" style="font-size:36px; color:rgb(44, 167, 204); opacity:0.8;"></i>
    </div>
    <!-- CAMERA LOCKED HERE -->
    <label for="avatarInput" style="position:absolute; bottom:-5px; right:-5px; width:30px; height:30px; background:#0f0; border:3px solid #1a1a2e; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.5);">
      <i class="fa-solid fa-camera" style="color:#000; font-size:13px;"></i>
    </label>
  </div>
  <div style="margin-top:12px;">
    <p style="color:rgb(0, 217, 255); font-size:13px; margin:0; font-weight:600;">Profile Photo</p>
    <p style="color:#666; font-size:11px; margin:4px 0 0;">Optional. You can add this later.</p>
  </div>
  <input type="file" id="avatarInput" accept="image/jpeg,image/png,image/webp" hidden>
</div>


        <button type="submit" id="authSubmit" class="auth-submit-btn">Continue</button>
        <div class="auth-error" id="authError" style="display:none;"></div>
      </form>
      <div class="auth-switch">
        <span id="switchAuthText">Don't have an account?</span>
        <button type="button" id="switchAuthBtn">Sign Up</button>
      </div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="authToast" role="alert" aria-live="polite">
    <i class="fa-solid fa-circle-check"></i>
    <div id="authToastText">Welcome</div>
  </div>

  <!-- ACCOUNT PANEL -->
  <div id="accountPanel" class="account-panel" aria-hidden="true">
    <div class="account-card">
      <div class="panel-avatar-wrap">
        <img id="panelAvatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='50' fill='%23111'/%3E%3Ccircle cx='50' cy='35' r='15' fill='%230f0'/%3E%3Cpath d='M50 55c-15 0-28 8-28 18v10h56V73c0-10-13-18-28-18z' fill='%230f0'/%3E%3C/svg%3E" alt="User avatar">

        <label for="changeAvatarInput" class="panel-edit-avatar" aria-label="Change profile photo">
          <i class="fa-solid fa-camera"></i>
        </label>
        <input type="file" id="changeAvatarInput" accept="image/jpeg,image/png,image/webp" hidden>
      </div>
      <h3 id="panelName">User</h3>
      <p id="panelEmail" class="panel-email">user@example.com</p>
      <div class="account-divider"></div>
      <button class="account-action" data-action="playlists"><i class="fa-solid fa-music"></i><span>Playlists</span></button>
      <button class="account-action" data-action="liked"><i class="fa-solid fa-heart"></i><span>Liked Beats</span></button>
      <button class="account-action" data-action="downloads"><i class="fa-solid fa-download"></i><span>Downloads</span></button>
      <button class="account-action" data-action="settings"><i class="fa-solid fa-gear"></i><span>Settings</span></button>

<!-- CONTROL CENTER - ADMIN ONLY -->
<button id="controlCenterBtn" class="account-action" data-action="control-center" style="display:none;">
  <i class="fa-solid fa-shield-halved"></i><span>Control Center</span>
</button>

<div class="account-divider"></div>

      <div class="account-divider"></div>
      <button id="logoutAction" class="account-action logout"><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></button>
    </div>
  </div>

  <!-- CROP MODAL -->
  <div id="cropModal" role="dialog" aria-labelledby="cropTitle" aria-hidden="true">
    <div class="crop-box">
      <h2 id="cropTitle">Crop Profile Photo</h2>
      <div class="crop-container"><img id="cropImage" alt="Image to crop"></div>
      <div class="crop-actions">
        <button type="button" id="cancelCrop" class="crop-btn cancel">Cancel</button>
        <button type="button" id="saveCrop" class="crop-btn save">Save Photo</button>
      </div>
    </div>
  </div>

</div>
