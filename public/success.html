<!DOCTYPE html>
<html>
<head>
  <title>Payment Successful</title>
  <style>
    body {
      background: #0f0f0f;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      padding: 40px;
      border-radius: 20px;
      background: rgba(255,255,255,0.05);
      box-shadow: 0 0 40px rgba(0,255,200,0.2);
    }

    h1 {
      color: #00ffcc;
      font-size: 32px;
    }

    p {
      margin-top: 10px;
      opacity: 0.7;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 20px;
      background: #00ffcc;
      color: black;
      text-decoration: none;
      border-radius: 10px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>✅ Payment Successful</h1>
    <p>Your license is ready.</p>
    <a href="/">Back to Store</a>

</body>
</html>
