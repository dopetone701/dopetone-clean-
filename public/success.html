<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful - Dope Tone Vault</title>
<style>
  body{margin:0;background:#0a0a0a;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;min-height:100vh}
  .card{background:#151515;border:1px solid #2a2a2a;border-radius:20px;padding:32px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.6)}
  .check{width:56px;height:56px;background:#00ffc6;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px}
  h1{margin:0 0 6px;font-size:22px} p{color:#888;font-size:13px;line-height:1.4}
  #amount{font-size:26px;font-weight:800;margin:18px 0;color:#fff}
  #details{text-align:left;background:#111;border:1px solid #222;border-radius:12px;padding:14px;font-size:13px;line-height:1.6;display:none;margin-top:16px}
  .btns{display:flex;gap:10px;margin-top:20px}
  .btn{flex:1;padding:12px;border-radius:12px;text-decoration:none;font-weight:700;font-size:13px;text-align:center}
  .btn-primary{background:linear-gradient(135deg,#8b5cf6,#00ffc6);color:#000}
  .btn-secondary{background:#222;color:#fff;border:1px solid #333}
  #status{margin-top:14px;font-size:12px;padding:8px;border-radius:8px}
  #status.ok{background:rgba(0,255,198,.1);color:#00ffc6;border:1px solid rgba(0,255,198,.2)}
  #status.warn{background:rgba(255,200,0,.1);color:#ffcc00;border:1px solid rgba(255,200,0,.2)}
  #status.err{background:rgba(255,60,60,.1);color:#ff6b6b;border:1px solid rgba(255,60,60,.2)}
</style>
</head>
<body>
<div class="card">
  <div class="check">✅</div>
  <h1 id="title">Verifying Payment</h1>
  <p id="subtitle">Please wait...</p>
  <div id="amount">...</div>
  <div id="details"></div>
  <div class="btns">
    <a id="enterVaultBtn" class="btn btn-primary" href="#">Enter Vault</a>
    <a class="btn btn-secondary" href="https://dopetonemusic.com">More Beats</a>
  </div>
  <div id="status">Initializing...</div>
</div>

<script>
const PAYPAL_WORKER_URL = 'https://pay-pal-api.dopetone701.workers.dev';
// === AUTO DETECT LOCAL VS LIVE ===
const VAULT_URL = (location.hostname === '127.0.0.1' || location.hostname === 'localhost')
  ? './vault.html'
  : 'https://dopetonevault.com/vault.html';

const params = new URLSearchParams(window.location.search);
// PayPal sends ?token=ORDER_ID - we support all
const sessionId = params.get('token') || params.get('paypal_order_id') || params.get('session_id') || params.get('order_id');
const isFree = params.get('free') === '1';

const titleEl = document.getElementById('title');
const subEl = document.getElementById('subtitle');
const amountEl = document.getElementById('amount');
const detailsEl = document.getElementById('details');
const statusEl = document.getElementById('status');
const enterVaultBtn = document.getElementById('enterVaultBtn');

const safeParse = (k,f)=>{ try{ const v=localStorage.getItem(k); return v?JSON.parse(v):f }catch{ return f } };
const shippedKey = (sid) => "dopetone_shipped_" + sid;

function clearAllLocalHistory(sid){
  localStorage.setItem("dopetone_history", "[]");
  localStorage.removeItem('dopetone_cart');
  localStorage.removeItem('dopetone_licences');
  localStorage.removeItem('dopetone_pending_checkout');
  try{ window.dispatchEvent(new Event('storage')); }catch{}
}

async function verifyViaWorker(sid){
  const url = `${PAYPAL_WORKER_URL}/capture-paypal-order?session_id=${encodeURIComponent(sid)}`;
  const res = await fetch(url);
  if(!res.ok){ const t=await res.text(); throw new Error(`PayPal ${res.status}: ${t.slice(0,200)}`); }
  return await res.json();
}

async function init(){
  window._retryCount = window._retryCount || 0;

  if(isFree){
    titleEl.textContent="Download Ready"; subEl.innerHTML="FREE beat unlocked.<br/>Check your downloads.";
    amountEl.textContent="FREE"; detailsEl.style.display='block'; detailsEl.innerHTML="Your FREE licence is ready.";
    clearAllLocalHistory('free_'+Date.now()); statusEl.className="ok"; statusEl.textContent="✅ Cart cleared";
    enterVaultBtn.href = VAULT_URL;
    return;
  }
  if(!sessionId){
    statusEl.className="warn"; statusEl.textContent="No PayPal order ID in URL - if you paid, check email.";
    amountEl.textContent="⚠️ No order";
    enterVaultBtn.href = VAULT_URL;
    return;
  }
  if(localStorage.getItem(shippedKey(sessionId))==="1"){
    titleEl.textContent="Already Unlocked"; amountEl.textContent="✅ Saved";
    subEl.innerHTML="This PayPal payment was already processed.<br/>Cart cleared.";
    statusEl.className="ok"; statusEl.textContent="✅ PayPal already saved - refresh safe, cart empty.";
    enterVaultBtn.href = `${VAULT_URL}?session_id=${encodeURIComponent(sessionId)}`;
    localStorage.setItem('dopetone_last_session_id', sessionId);
    clearAllLocalHistory(sessionId); return;
  }

  const preHistory = safeParse("dopetone_history", []);
  const preLicences = safeParse("dopetone_licences", {});

  try{
    statusEl.className="warn"; statusEl.textContent="Verifying with PayPal...";
    const data = await verifyViaWorker(sessionId);
    console.log("PAYPAL-STATUS:", data);

    const session = data.session || data;
    const purchases = data.purchases || [];
    const isPaid = data.status === 'paid' || session.status === 'paid' || session.status === 'COMPLETED';

    if(isPaid){
      const totalCents = data.total_cents || session.total_cents || 0;
      const dollars = (totalCents/100).toFixed(2);
      const email = data.customer_email || session.customer_email || '';

      titleEl.textContent="PayPal Verified";
      subEl.innerHTML="PayPal payment confirmed.<br/>Sounds unlocked.";
      amountEl.textContent = totalCents ? `$${dollars} PAID` : `PAID`;
      statusEl.className="ok";

      let html = "<strong>Unlocked:</strong><br/>";
      if(purchases.length){
        purchases.forEach(p=> html+=`• ${p.beat_title} - $${Number(p.dollars||p.amount/100||0).toFixed(2)}<br/>`);
      } else if(preHistory.length){
        preHistory.forEach(i=>{ if(i.amount) html+=`• ${i.beat_title||'Beat '+i.beat_id} - $${(i.amount/100).toFixed(2)}<br/>`; });
      } else {
        Object.values(preLicences).forEach(l=> html+=`• ${l.title||'Beat'} - ${l.name} - $${l.price}<br/>`);
      }
      if(email) html+=`<br/><small>Receipt: ${email}</small>`;
      detailsEl.innerHTML=html; detailsEl.style.display='block';

      localStorage.setItem(shippedKey(sessionId), "1");
      localStorage.setItem('dopetone_last_session_id', sessionId);
      if(email) localStorage.setItem('dopetone_last_paid_email', email);
     
      const finalVaultUrl = `${VAULT_URL}?session_id=${encodeURIComponent(sessionId)}`;
      enterVaultBtn.href = finalVaultUrl;
      enterVaultBtn.onclick = (e)=>{
        e.preventDefault();
        window.location.href = finalVaultUrl;
      };

      clearAllLocalHistory(sessionId);
      statusEl.textContent=`✅ Revenue secured - $${dollars} - PayPal - cart cleared`;
      return;
    }

    window._retryCount++;
    if (window._retryCount > 15) {
      statusEl.className="err";
      statusEl.textContent=`Still pending after 30s. Order: ${sessionId.slice(0,25)}... - contact support`;
      enterVaultBtn.href = `${VAULT_URL}?session_id=${encodeURIComponent(sessionId)}`;
      return;
    }
    statusEl.className="warn"; amountEl.textContent="Processing...";
    statusEl.textContent=`PayPal status: ${session.status || data.status || 'pending'} - retrying (${window._retryCount}/15)...`;
    setTimeout(init, 2000);

  }catch(e){
    console.error("Verify error", e);
    window._retryCount++;
    if (window._retryCount > 15) {
      statusEl.className="err";
      statusEl.textContent=`Failed: ${e.message}`;
      enterVaultBtn.href = `${VAULT_URL}?session_id=${encodeURIComponent(sessionId)}`;
      return;
    }
    statusEl.className="err";
    statusEl.textContent=`Retrying PayPal... ${e.message} (${window._retryCount}/15)`;
    setTimeout(init, 2000);
  }
}
init();
</script>
</body>
</html>
