<!DOCTYPE html>
<html lang="en">

<head>

<!-- MAIN -->
<link rel="stylesheet" href="styles/main.css">
<link rel="stylesheet" href="styles/navbar.css">
<link rel="stylesheet" href="styles/auth.css">
<link rel="stylesheet" href="styles/playlist-modal.css">

<!-- PAGE -->
<link rel="stylesheet" href="styles/arsenal.css">
<link rel="stylesheet" href="styles/arsenal-premium.css">
<link rel="stylesheet" href="styles/arsenal-hero.css">
<link rel="stylesheet" href="styles/arsenal-bg.css">
<link rel="stylesheet" href="styles/beats.css">
<link rel="stylesheet" href="styles/grid-beats.css">

<link rel="stylesheet" href="styles/full-screen.css">
<link rel="stylesheet" href="styles/playlists.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css" />

</head>

<body>

<!-- ================= NAVBAR ================= -->
<div id="navbarMount"></div>

<!-- ================= AUTH ================= -->
<div id="authMount"></div>

<!-- ================= HERO ================= -->
<section class="arsenal-hero playlist-hero">
<div class="page-wrap">
<div class="arsenal-hero-inner">
<h1 class="arsenal-title">All Beats Arsenal</h1>
<p class="arsenal-sub">Explore the full sound library — crafted for elite creators</p>
</div>
</div>
</section>

<!-- ================= VIEW TOGGLE + SEARCH ================= -->
<div class="view-toggle">
  <button id="listBtn" class="active">List</button>
  <button id="gridBtn">Grid</button>
 
  <div class="arsenal-search">
    <input
      type="search"
      name="beat_search_qt7x9f"
      id="beatSearch"
      placeholder="Search..."
      autocomplete="off"
      role="searchbox"
      readonly
      onfocus="this.removeAttribute('readonly')"
      data-lpignore="true"
      data-1p-ignore="true"
      data-bwignore="true"
      data-form-type="other"
    >
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</div>

<!-- ================= LIST VIEW ================= -->
<section id="arsenalSection">
<div class="arsenal-container" id="waveList">
<p class="loading">Loading beats...</p>
</div>
</section>

<!-- ================= GRID VIEW ================= -->
<section id="gridSection" style="display:none;">
<div id="gridContainer"></div>
</section>

<!-- ================= CREATE SYSTEM ================= -->
<button id="createBtn" class="create-btn" style="display:none;">+</button>
<div id="createPanel" class="create-panel" style="display:none;">
<a href="create-beat.html"><button>Upload Beats</button></a>
<a href="create-pack.html"><button>Sample Packs</button></a>
<a href="create-sample.html"><button>Upload Sample</button></a>
</div>

<!-- ================= GLOBAL PLAYER - SVG ONLY ================= -->
<div id="globalPlayerUI" class="global-player">
        <div class="gp-left">
            <img id="gpCover" src="images/logo.png" />
            <div class="gp-text" id="gpInfo">
                <div id="gpTitle">No track</div>
                <button id="gpAdd">+</button>
            </div>
        </div>
       
        <div class="gp-center">
            <div class="gp-controls">
               <button id="gpShuffle" class="player-btn" title="Enable shuffle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M10.59 9.17L5.41 4L4 5.41l5.17 5.17l1.42-1.41zM14.5 4l2.04 2.04L4 18.59L5.41 20L17.96 7.46L20 9.5V4h-5.5zm.33 9.41l-1.41 1.41l3.13 3.13L14.5 20H20v-5.5l-2.04 2.04l-3.13-3.13z"/>
                    </svg>
                </button>

                <button id="gpPrev" class="player-btn" title="Previous">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                    </svg>
                </button>

                <button id="gpPlay" class="player-btn" title="Play" aria-label="Play/Pause">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                        <path id="gpPlayPath" d="M8 5v14l11-7z"/>
                    </svg>
                </button>

                <button id="gpNext" class="player-btn" title="Next">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                    </svg>
                </button>

                <button id="gpRepeat" class="player-btn" title="Enable repeat">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                    </svg>
                </button>

                <button id="gpDownload" class="gp-side player-btn" title="Download">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                    </svg>
                </button>
                <button id="gpMore" class="gp-side player-btn" title="More">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                    </svg>
                </button>

            </div>
           
            <div class="gp-progress-wrap">
                <span id="gpCurrent">0:00</span>
                <div id="gpProgress"><div id="gpBar"></div></div>
                <span id="gpDuration">0:00</span>
            </div>
        </div>
       
        <div class="gp-right">
            <button id="loveTrackBtn" class="love-track-btn">
                <span class="love-text">LOVE IT</span>
                <span class="love-heart">♡</span>
            </button>
            <div class="wave-card player-cover-wrap">
                <canvas id="liquidEq" width="54" height="54"></canvas>
            </div>
        </div>
    </div>
<!-- ================= MOBILE PLAYER - SVG ONLY ================= -->
<div id="mobilePlayer" class="mobile-player">
        <div class="mp-header">
            <span id="mpClose">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/>
                </svg>
            </span>
        </div>
        <img id="mpCover" src="images/logo.png">
        <div id="mpTitle">No track</div>
       
        <div class="mp-controls">
            <button id="mpPrev" class="player-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>
           
            <button id="mpPlay" class="player-btn play-btn" title="Play" aria-label="Play/Pause">
    <svg width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
        <path id="mpPlayPath" d="M8 5v14l11-7z"/>
    </svg>
</button>

           
            <button id="mpNext" class="player-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>
        </div>
       
        <div id="mpProgress"><div id="mpBar"></div></div>
       
        <div class="mp-time">
            <span id="mpCurrent">0:00</span>
            <span id="mpDuration">0:00</span>
        </div>
       
        <div class="mp-actions">
            <button id="mpLike" class="love-track-btn">
                <span class="love-heart">♡</span>
            </button>
           
            <button id="mpShuffle" class="player-btn" title="Shuffle">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10.59 9.17L5.41 4L4 5.41l5.17 5.17l1.42-1.41zM14.5 4l2.04 2.04L4 18.59L5.41 20L17.96 7.46L20 9.5V4h-5.5zm.33 9.41l-1.41 1.41l3.13 3.13L14.5 20H20v-5.5l-2.04 2.04l-3.13-3.13z"/>
                </svg>
            </button>
           
            <button id="mpRepeat" class="player-btn" title="Repeat">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                </svg>
            </button>
           
            <button id="mpDownload">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </button>
           
            <button id="mpBuy" class="player-btn" title="Buy Track">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M11.8 10.9c-2.27-.59-3-1.2-3-2.15 0-1.09 1.01-1.85 2.7-1.85 1.78 0 2.44.85 2.5 2.1h2.21c-.07-1.72-1.12-3.3-3.21-3.81V3h-3v2.16c-1.94.42-3.5 1.68-3.5 3.61 0 2.31 1.91 3.46 4.7 4.13 2.5.6 3 1.48 3 2.41 0 .69-.49 1.79-2.7 1.79-2.06 0-2.87-.92-2.98-2.1h-2.2c.12 2.19 1.76 3.42 3.68 3.83V21h3v-2.15c1.95-.37 3.5-1.5 3.5-3.55 0-2.84-2.43-3.81-4.7-4.4z"/>
    </svg>
</button>



            <button id="mpMore">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/>
                </svg>
            </button>
        </div>
    </div>


<!-- ================= OWNER ================= -->
<script>
const isOwner = localStorage.getItem("isOwner")
if (isOwner === "true") {
document.getElementById("createBtn").style.display = "block"
document.getElementById("createPanel").style.display = "block"
}
</script>
