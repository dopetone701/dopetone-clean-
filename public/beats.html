<!-- 🔥 INFINITE SCROLL + BG FIX -->
<style>
html { scroll-behavior: smooth; }
body {
  background: #05070d!important;
  background-attachment: fixed!important;
  overflow-anchor: none!important;
  -webkit-overflow-scrolling: touch;
  min-height: 100vh;
  padding-bottom: 140px!important;
}
#gridSection {
  min-height: 100vh;
  will-change: transform;
  transform: translateZ(0);
  padding-bottom: 40px!important;
}
#gridContainer {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 280px));
  justify-content: center;
  gap: 20px;
  padding: 20px;
  content-visibility: auto;
  contain-intrinsic-size: 300px;
}
.grid-card {
  will-change: transform;
  backface-visibility: hidden;
  transform: translateZ(0);
  contain: layout paint;
  background: linear-gradient(145deg, #0f172a, #020617);
  border-radius: 16px;
  padding: 14px;
  border: 1px solid rgba(255,255,255,0.06);
  width: 100%;
  max-width: 280px;
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}
.grid-card:hover { transform: translateY(-6px) scale(1.02); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
.grid-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 12px;
  background: #0f172a;
  margin-bottom: 10px;
}
.grid-media { position: relative; }
.grid-title { font-size: 14px; font-weight: 600; color: #fff; }
.grid-tag { font-size: 12px; color: #00f0ff; opacity: 0.8; }
.grid-price-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer; }
.grid-price-row .new-price { color: #00f0ff; font-weight: bold; font-size: 15px; }
.grid-actions { display: flex; gap: 8px; margin-top: 10px; }
.grid-buy { flex: 1; background: linear-gradient(135deg, #00f0ff, #7c3aed); border: none; padding: 8px; border-radius: 8px; color: white; font-size: 13px; cursor: pointer; }
#gridSentinel { height: 400px!important; width: 100%; }
#arsenalSection .arsenal-container { display: flex!important; flex-direction: column!important; gap: 12px; padding: 20px; }
.global-player{ position:fixed!important; bottom:12px!important; left:50%!important; transform:translateX(-50%)!important; z-index:99999!important; }
@media (max-width: 768px){
  #gridContainer { grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 10px; }
  .grid-card img { height: 110px; }
  body{ padding-bottom:180px!important; }
}
</style>
</head>

<div id="navbarMount"></div>

<!-- ================= AUTH ================= -->
<div id="authMount"></div>

<!-- ================= HERO ================= -->
<section class="arsenal-hero playlist-hero">

<div class="arsenal-hero-inner">

<!-- ================= VIEW TOGGLE + SEARCH ================= -->
<div class="view-toggle">
  <button id="listBtn" class="active">List</button>
  <button id="gridBtn">Grid</button>
  <div class="arsenal-search">
    <input
      type="search"
      name="beat_search_qt7x9f"
      id="beatSearch"
      placeholder="Search..."
      autocomplete="off"
      role="searchbox"
      readonly
      onfocus="this.removeAttribute('readonly')"
      data-lpignore="true"
      data-1p-ignore="true"
      data-bwignore="true"
      data-form-type="other"
    >
    <div class="search-dropdown" id="searchDropdown"></div>
  </div>
</div>

</div>
</section>

</section>
