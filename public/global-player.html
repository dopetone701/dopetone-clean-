<!-- ================= GLOBAL PLAYER - SVG ONLY ================= -->
<div id="globalPlayerUI" class="global-player">
    <div class="gp-left">
        <img id="gpCover" src="images/logo.png" alt="">
        <div class="gp-text" id="gpInfo">
            <div id="gpTitle">No track</div>
            <button id="gpAdd" type="button">+</button>
        </div>
    </div>
   
    <div class="gp-center">
        <div class="gp-controls">
            <button id="gpShuffle" class="player-btn" type="button" title="Enable shuffle">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13z"/>
                </svg>
            </button>

            <button id="gpPrev" class="player-btn" type="button" title="Previous">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
                </svg>
            </button>

            <button id="gpPlay" class="player-btn" type="button" title="Play">
                <svg class="play-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M8 5v14l11-7z"/>
                </svg>
                <svg class="pause-icon" width="22" height="22" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                    <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                </svg>
            </button>

            <button id="gpNext" class="player-btn" type="button" title="Next">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
                </svg>
            </button>

            <button id="gpRepeat" class="player-btn" type="button" title="Enable repeat">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
                </svg>
            </button>

            <button id="gpDownload" class="gp-side player-btn" type="button" title="Download">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
            </button>
            <button id="gpMore" class="gp-side player-btn" type="button" title="More">⋯</button>
        </div>
       
        <div class="gp-progress-wrap">
            <span id="gpCurrent">0:00</span>
            <div id="gpProgress"><div id="gpBar"></div></div>
            <span id="gpDuration">0:00</span>
        </div>
    </div>
   
    <div class="gp-right">
        <button id="loveTrackBtn" class="love-track-btn" type="button">
            <span class="love-text">LOVE IT</span>
            <span class="love-heart">♡</span>
        </button>
        <div class="wave-card player-cover-wrap">
            <canvas id="liquidEq" width="58" height="58"></canvas>
        </div>
    </div>
</div>

<!-- ================= MOBILE PLAYER - SVG ONLY ================= -->
<div id="mobilePlayer" class="mobile-player">
    <div class="mp-header">
        <span id="mpClose">↓</span>
    </div>
    <img id="mpCover" src="images/logo.png" alt="">
    <div id="mpTitle">No track</div>
   
    <div class="mp-controls">
        <button id="mpPrev" class="player-btn" type="button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
            </svg>
        </button>
       
        <button id="mpPlay" class="player-btn play-btn" type="button">
            <svg class="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <svg class="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none;">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
            </svg>
        </button>
       
        <button id="mpNext" class="player-btn" type="button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
            </svg>
        </button>
    </div>
   
    <div id="mpProgress"><div id="mpBar"></div></div>
   
    <div class="mp-time">
        <span id="mpCurrent">0:00</span>
        <span id="mpDuration">0:00</span>
    </div>
   
    <div class="mp-actions">
        <button id="mpLike" class="love-track-btn" type="button"><span class="love-heart">♡</span></button>
        <button id="mpShare" type="button" title="Share">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92z"/>
            </svg>
        </button>
        <button id="mpDownload" type="button" title="Download">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
            </svg>
        </button>
        <button id="mpBuy" type="button">💳</button>
        <button id="mpMore" type="button">⋯</button>
    </div>
</div>
