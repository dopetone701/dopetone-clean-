<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Your Vault - Dope Tone</title>
<style>
body{margin:0;background:#0a0f2a;color:#fff;font-family:system-ui;padding:24px}
.wrap{max-width:860px;margin:0 auto}
.head{background:linear-gradient(135deg,#1a1f4d,#0a0f2a);border:1px solid #222c5a;border-radius:20px;padding:22px;margin-bottom:16px}
.card{background:linear-gradient(180deg,#151b3d,#101536);border:1px solid #242c5f;border-radius:20px;padding:20px;margin:14px 0}
.btn{display:inline-flex;align-items:center;gap:6px;padding:11px 14px;border-radius:12px;text-decoration:none;font-weight:700;font-size:12px;margin:6px 6px 0 0;border:0;cursor:pointer}
.btn-mp3{background:#fff;color:#000}.btn-wav{background:#7c6cff;color:#fff}.btn-stems{background:#00e6c0;color:#000}
.btn-doc{background:#1e2550;color:#aab3ff;border:1px solid #2d376e}
.btn-disabled{opacity:.3;pointer-events:none}
.badge{font-size:10px;padding:4px 8px;border-radius:99px;background:#1e2550;color:#7d8bff;border:1px solid #2d376e}
.muted{color:#7d8bff;font-size:12px;line-height:1.6}
h1{margin:0 0 6px;font-size:22px}
</style>
</head>
<body>
<div class="wrap">
<div class="head">
<h1>🔒 Your Private Vault</h1>
<div id="status" class="muted">Verifying...</div>
</div>
<div id="downloads"></div>
</div>

<script>
const VAULT_API = 'https://vault-orders-api.dopetone701.workers.dev';
const sid = new URLSearchParams(location.search).get('session_id') || localStorage.getItem('dopetone_last_session_id');
const statusEl = document.getElementById('status');
const downloadsEl = document.getElementById('downloads');

const RULES = {
  free: { mp3:true, wav:false, stems:false, streams:'No streaming', rights:'Tagged • Non-profit • Practice only' },
  basic: { mp3:true, wav:true, stems:false, streams:'5,000 streams', rights:'Commercial use • Limited use' },
  pro: { mp3:true, wav:true, stems:true, streams:'50,000 streams', rights:'Monetization • Advanced use' },
  exclusive: { mp3:true, wav:true, stems:true, streams:'Unlimited streams', rights:'Full ownership • Beat removed • Commercial rights' }
};

function getRule(type){
  const t=(type||'basic').toLowerCase();
  if(t.includes('exclusive')) return RULES.exclusive;
  if(t.includes('pro')) return RULES.pro;
  if(t.includes('free')) return RULES.free;
  return RULES.basic;
}

function dlText(name, txt){
  const b=new Blob([txt],{type:'text/plain'}); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(u),1000);
}

if(!sid){ statusEl.textContent='No session_id. Open from success page.'; }
else {
 fetch(VAULT_API+'/api/orders/status?session_id='+encodeURIComponent(sid))
.then(r=>r.json()).then(data=>{
  if(data.status!=='paid'){ statusEl.textContent='Status: '+data.status; return; }
  const email=data.customer_email||''; const date=new Date().toLocaleString();
  statusEl.innerHTML='✅ Paid - $'+(data.total_cents/100).toFixed(2)+' - '+data.downloads.length+' beats unlocked<br>'+email+' • '+date;

  data.downloads.forEach(d=>{
    const rule=getRule(d.license_type);
    const card=document.createElement('div'); card.className='card';

    const inc = [];
    if(rule.mp3) inc.push('MP3'+(rule===RULES.free?' (tagged)':''));
    if(rule.wav) inc.push('WAV');
    if(rule.stems) inc.push('STEMS');
    if(!rule.stems) inc.push('No stems');

    card.innerHTML = '<div style="display:flex;justify-content:space-between;align-items:center"><b>'+d.beat_title+'</b> <span class="badge">'+d.license_type.toUpperCase()+' • $'+(d.amount/100).toFixed(2)+'</span></div>' +
    '<div class="muted" style="margin:8px 0">'+inc.join(' • ')+'<br>'+rule.streams+' • '+rule.rights+'</div>' +
    '<div id="btns-'+d.beat_id+'"></div>';

    downloadsEl.appendChild(card);
    const btnWrap=card.querySelector('#btns-'+d.beat_id);

    if(rule.mp3){
      const a=document.createElement('a'); a.className='btn btn-mp3'; a.href=VAULT_API+d.links.mp3; a.textContent='⬇ MP3';
      btnWrap.appendChild(a);
    }
    if(rule.wav){
      const a=document.createElement('a'); a.className='btn btn-wav'; a.href=VAULT_API+d.links.wav; a.textContent='⬇ WAV';
      btnWrap.appendChild(a);
    } else {
      const s=document.createElement('span'); s.className='btn btn-doc btn-disabled'; s.textContent='WAV not in Free';
      if(d.license_type.toLowerCase()!=='free') s.textContent='WAV not in '+d.license_type;
      btnWrap.appendChild(s);
    }
    if(rule.stems){
      const a=document.createElement('a'); a.className='btn btn-stems'; a.href=VAULT_API+d.links.stems; a.textContent='⬇ STEMS ZIP';
      btnWrap.appendChild(a);
    } else {
      const s=document.createElement('span'); s.className='btn btn-doc btn-disabled'; s.textContent= d.license_type.toLowerCase()==='basic'? 'No stems in Basic' : 'No stems';
      btnWrap.appendChild(s);
    }

    const lic=document.createElement('button'); lic.className='btn btn-doc'; lic.textContent='📄 Licence Agreement';
    lic.onclick=()=>{
      const txt='DOPE TONE MUSIC - OFFICIAL LICENCE\n'+
      'Beat: '+d.beat_title+'\nLicence: '+d.license_type.toUpperCase()+'\nBuyer: '+email+'\nOrder: '+sid+'\nDate: '+date+'\nAmount: $'+(d.amount/100).toFixed(2)+'\n\n'+
      'INCLUDES: '+inc.join(', ')+'\n'+
      'STREAMS: '+rule.streams+'\nRIGHTS: '+rule.rights+'\n\n'+
      (d.license_type.toLowerCase().includes('exclusive')?'This beat is now removed from store. Full ownership transferred to buyer.':'Non-exclusive licence. Dope Tone retains ownership.')+'\n\nCredit: Prod. By Dope Tone\nTerms: https://dopetonevault.com/terms\n';
      dlText(d.beat_title+'_'+d.license_type+'_Licence.txt', txt);
    };
    const read=document.createElement('button'); read.className='btn btn-doc'; read.textContent='📖 Readme';
    read.onclick=()=>{
      const txt='Thanks for buying '+d.beat_title+'!\n\nYOU GOT: '+inc.join(', ')+'\n'+rule.streams+'\n'+rule.rights+'\n\nHOW TO:\n1. Import '+ (rule.wav?'WAV':'MP3') +' to DAW\n2. Record\n3. Mix & Master'+(rule.stems?' (use stems for full mix)':'')+'\n4. Credit: Prod. By Dope Tone\n\nSupport: support@dopetonevault.com\n';
      dlText(d.beat_title+'_README.txt', txt);
    };
    btnWrap.appendChild(lic); btnWrap.appendChild(read);
  });
 }).catch(e=>{ statusEl.textContent='Error: '+e.message; });
}
</script>
</body>
</html>
